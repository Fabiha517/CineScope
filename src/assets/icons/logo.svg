<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cineGradient" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo Icon -->
  <rect
    x="10"
    y="10"
    width="44"
    height="44"
    rx="14"
    fill="url(#cineGradient)"
    filter="url(#glow)"
  />

  <!-- Play -->
  <path
    d="M28 23L42 32L28 41V23Z"
    fill="white"
  />

  <!-- Film Holes -->
  <circle cx="16" cy="18" r="1.3" fill="#F3E8FF"/>
  <circle cx="16" cy="26" r="1.3" fill="#F3E8FF"/>
  <circle cx="16" cy="34" r="1.3" fill="#F3E8FF"/>
  <circle cx="16" cy="42" r="1.3" fill="#F3E8FF"/>

  <circle cx="48" cy="18" r="1.3" fill="#F3E8FF"/>
  <circle cx="48" cy="26" r="1.3" fill="#F3E8FF"/>
  <circle cx="48" cy="34" r="1.3" fill="#F3E8FF"/>
  <circle cx="48" cy="42" r="1.3" fill="#F3E8FF"/>

  <!-- Brand Name -->
  <text
    x="72"
    y="39"
    font-family="Poppins, Inter, sans-serif"
    font-size="28"
    font-weight="600"
    fill="#F8FAFC"
    letter-spacing="0.5">
    Cine<tspan fill="#C084FC">Scope</tspan>
  </text>
</svg>